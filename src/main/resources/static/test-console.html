<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>秒杀测试控制台</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8dee8;
      --text: #172033;
      --muted: #667085;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --danger: #b42318;
      --warn: #a15c07;
      --ok: #067647;
      --code: #101828;
      --soft: #eef4ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 "Inter", "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(10px);
    }

    .topbar {
      max-width: 1320px;
      margin: 0 auto;
      padding: 14px 20px;
      display: grid;
      grid-template-columns: minmax(210px, 1fr) minmax(260px, 520px);
      gap: 16px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 750;
    }

    .sub {
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .tokenbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
    }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 18px 20px 28px;
      display: grid;
      grid-template-columns: minmax(300px, 380px) 1fr;
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    section h2 {
      margin: 0 0 12px;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 720;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 9px 10px;
      font: inherit;
      outline: none;
      min-height: 38px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 12px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, .12);
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      min-height: 36px;
      padding: 8px 11px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button.primary:hover { background: var(--accent-dark); }
    button:hover { border-color: #98a2b3; }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .small {
      min-height: 32px;
      padding: 6px 9px;
      font-size: 12px;
    }

    .captchaBox {
      display: grid;
      grid-template-columns: 156px 1fr;
      gap: 10px;
      align-items: center;
    }

    .captchaBox img {
      width: 156px;
      height: 56px;
      border: 1px solid var(--line);
      border-radius: 6px;
      object-fit: cover;
      background: #fff;
    }

    .statusLine {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcff;
      min-height: 68px;
    }

    .metric b {
      display: block;
      font-size: 20px;
      line-height: 1.1;
      margin-top: 4px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      margin: -2px -2px 12px;
      padding: 0 2px 8px;
    }

    .tabs button {
      min-height: 32px;
      border-radius: 6px;
      font-size: 12px;
    }

    .tabs button.active {
      background: var(--soft);
      border-color: #b2ccff;
      color: #1849a9;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }

    th {
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    tr:last-child td { border-bottom: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef4ff;
      color: #1849a9;
      font-size: 12px;
      font-weight: 700;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--danger); }
    .warn { color: var(--warn); }

    pre {
      margin: 0;
      min-height: 220px;
      max-height: 420px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--code);
      color: #f2f4f7;
      padding: 12px;
      font: 12px/1.55 "Cascadia Code", Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .hidden { display: none !important; }

    @media (max-width: 900px) {
      .topbar, main {
        grid-template-columns: 1fr;
      }

      .tokenbar, .statusLine, .grid3 {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .grid2, .captchaBox {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="topbar">
    <div>
      <h1>秒杀测试控制台</h1>
      <div class="sub">本地接口测试面板：认证、秒杀、轮询、订单和小批量压测</div>
    </div>
    <div class="tokenbar">
      <input id="tokenInput" placeholder="token 请求头，可登录后自动填入">
        <button type="button" class="small" id="saveTokenBtn">保存</button>
        <button type="button" class="small" id="clearTokenBtn">清空</button>
    </div>
  </div>
</header>

<main>
  <div class="stack">
    <section>
      <h2>认证</h2>
      <div class="row">
        <div>
          <label for="phoneInput">手机号</label>
          <input id="phoneInput" value="13900000001" maxlength="11">
        </div>
        <div>
          <label for="passwordInput">密码</label>
          <input id="passwordInput" type="password" value="123456">
        </div>
      </div>
      <div class="inline" style="margin-bottom:10px">
        <label class="inline" style="margin:0">
          <input id="alreadyMd5" type="checkbox" style="width:auto;min-height:auto">
          密码已是 32 位 MD5
        </label>
      </div>
      <div class="captchaBox row">
        <img id="captchaImg" alt="验证码">
        <div>
          <label for="captchaInput">验证码</label>
          <input id="captchaInput" maxlength="6" placeholder="区分大小写">
        </div>
      </div>
      <div class="inline">
        <button type="button" id="captchaBtn">获取验证码</button>
        <button type="button" id="loginBtn" class="primary">登录</button>
        <button type="button" id="registerBtn">注册</button>
      </div>
      <div class="hint" id="authHint">先获取验证码，再登录或注册</div>
      <div class="hint" id="userHint">未登录</div>
    </section>

    <section>
      <h2>秒杀</h2>
      <div class="grid2 row">
        <div>
          <label for="goodsIdInput">商品 ID</label>
          <input id="goodsIdInput" type="number" min="1" value="1">
        </div>
        <div>
          <label for="pollIntervalInput">轮询间隔 ms</label>
          <input id="pollIntervalInput" type="number" min="300" step="100" value="1000">
        </div>
      </div>
      <div class="inline">
        <button type="button" class="primary" id="seckillBtn">提交秒杀</button>
        <button type="button" id="resultBtn">查结果</button>
        <button type="button" id="startPollBtn">开始轮询</button>
        <button type="button" id="stopPollBtn">停止轮询</button>
      </div>
      <div class="hint" id="seckillHint">等待操作</div>
    </section>

    <section>
      <h2>小批量压测</h2>
      <div class="grid3 row">
        <div>
          <label for="loadTotalInput">请求数</label>
          <input id="loadTotalInput" type="number" min="1" value="100">
        </div>
        <div>
          <label for="loadConcurrencyInput">并发数</label>
          <input id="loadConcurrencyInput" type="number" min="1" value="20">
        </div>
        <div>
          <label for="loadGoodsInput">商品 ID</label>
          <input id="loadGoodsInput" type="number" min="1" value="1">
        </div>
      </div>
      <div class="row">
        <label for="tokenListInput">压测 token 列表，一行一个</label>
        <textarea id="tokenListInput" placeholder="loadtest-910001&#10;loadtest-910002&#10;loadtest-910003"></textarea>
      </div>
      <div class="inline">
        <button type="button" id="loadTestBtn" class="primary">开始压测</button>
        <button type="button" id="stopLoadBtn">停止</button>
      </div>
      <div class="hint">浏览器压测只适合本地小批量冒烟，正式数据建议用 JMeter/k6。</div>
    </section>
  </div>

  <div class="stack">
    <section>
      <div class="statusLine">
        <div class="metric"><span>成功</span><b id="mSuccess">0</b></div>
        <div class="metric"><span>售罄/失败</span><b id="mFail">0</b></div>
        <div class="metric"><span>平均耗时</span><b id="mAvg">0 ms</b></div>
        <div class="metric"><span>P95</span><b id="mP95">0 ms</b></div>
      </div>
    </section>

    <section>
      <div class="tabs">
        <button class="active" data-tab="tabOrders">订单</button>
        <button data-tab="tabDetail">详情</button>
        <button data-tab="tabLog">日志</button>
      </div>
      <div id="tabOrders" class="panel active">
        <div class="inline" style="margin-bottom:10px">
          <button type="button" id="ordersBtn">刷新订单</button>
        </div>
        <div id="ordersTable"></div>
      </div>
      <div id="tabDetail" class="panel">
        <div class="grid2 row">
          <div>
            <label for="orderIdInput">订单 ID</label>
            <input id="orderIdInput" type="number" min="1">
          </div>
          <div class="inline" style="align-items:end">
            <button type="button" id="detailBtn">查询详情</button>
          </div>
        </div>
        <div id="detailBox"></div>
      </div>
      <div id="tabLog" class="panel">
        <div class="inline" style="margin-bottom:10px">
          <button type="button" id="clearLogBtn">清空日志</button>
        </div>
        <pre id="logBox"></pre>
      </div>
    </section>
  </div>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  const state = {
    token: localStorage.getItem('seckill.token') || '',
    pollTimer: null,
    loadAbort: false,
    metrics: []
  };

  $('tokenInput').value = state.token;
  updateUserHint();

  function log(message, data) {
    const time = new Date().toLocaleTimeString();
    const suffix = data === undefined ? '' : '\\n' + JSON.stringify(data, null, 2);
    $('logBox').textContent = `[${time}] ${message}${suffix}\\n\\n` + $('logBox').textContent;
  }

  function setHint(id, message, kind = '') {
    const el = $(id);
    el.className = `hint ${kind}`.trim();
    el.textContent = message;
  }

  function tokenHeaders(extra = {}) {
    const token = $('tokenInput').value.trim();
    return token ? { ...extra, token } : extra;
  }

  async function api(path, options = {}) {
    const started = performance.now();
    const res = await fetch(path, options);
    const text = await res.text();
    let json;
    try { json = JSON.parse(text); } catch { json = { raw: text }; }
    return { res, json, ms: performance.now() - started };
  }

  function getPhone() {
    return $('phoneInput').value.trim();
  }

  function getFormPassword() {
    const password = $('passwordInput').value;
    if ($('alreadyMd5').checked) return password.trim();
    return md5(password);
  }

  function updateUserHint(user) {
    const token = $('tokenInput').value.trim();
    if (!token) {
      $('userHint').textContent = '未登录';
      return;
    }
    $('userHint').innerHTML = user
      ? `已登录：<span class="ok">${user.nickname || user.phone}</span>`
      : `已保存 token：<span class="pill">${token.slice(0, 10)}...</span>`;
  }

  async function getCaptcha() {
    try {
      setHint('authHint', '正在获取验证码...');
      const phone = getPhone();
      const { json } = await api(`/captcha?phone=${encodeURIComponent(phone)}`);
      if (json.code === 0 && json.data?.imageBase64) {
        $('captchaImg').src = json.data.imageBase64;
        setHint('authHint', '验证码已刷新，请输入图片中的 6 位字符', 'ok');
        log('验证码已刷新', { expireSeconds: json.data.expireSeconds });
      } else {
        setHint('authHint', json.message || '验证码获取失败', 'bad');
        log('验证码获取失败', json);
      }
    } catch (error) {
      setHint('authHint', `请求失败：${error.message}`, 'bad');
      log('验证码请求异常', { message: error.message });
    }
  }

  async function auth(type) {
    const actionText = type === 'login' ? '登录' : '注册';
    try {
      setHint('authHint', `正在${actionText}...`);
      const payload = {
        phone: getPhone(),
        password: getFormPassword(),
        captcha: $('captchaInput').value.trim()
      };
      const { json, ms } = await api(`/${type}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      log(`${actionText}响应`, { ms: Math.round(ms), ...json });
      if (json.code === 0 && json.data?.token) {
        $('tokenInput').value = json.data.token;
        localStorage.setItem('seckill.token', json.data.token);
        updateUserHint(json.data.user);
        setHint('authHint', '登录成功，token 已保存', 'ok');
      } else if (json.code === 0) {
        setHint('authHint', json.data || json.message || `${actionText}成功`, 'ok');
      } else {
        setHint('authHint', json.message || `${actionText}失败`, 'bad');
      }
      if (json.data?.imageBase64) {
        $('captchaImg').src = json.data.imageBase64;
      }
    } catch (error) {
      setHint('authHint', `请求失败：${error.message}`, 'bad');
      log(`${actionText}请求异常`, { message: error.message });
    }
  }

  async function submitSeckill() {
    const goodsId = $('goodsIdInput').value;
    const { json, ms } = await api(`/seckill/${goodsId}`, {
      method: 'POST',
      headers: tokenHeaders()
    });
    $('seckillHint').textContent = `${json.message || '响应'}，耗时 ${Math.round(ms)} ms`;
    log('秒杀提交响应', { ms: Math.round(ms), ...json });
  }

  async function queryResult() {
    const goodsId = $('goodsIdInput').value;
    const { json, ms } = await api(`/seckill/result/${goodsId}`, {
      headers: tokenHeaders()
    });
    const data = json.data || {};
    $('seckillHint').innerHTML = `结果：<span class="${data.status === 'success' ? 'ok' : data.status === 'failed' ? 'bad' : 'warn'}">${data.status || json.message}</span>`;
    if (data.orderId) $('orderIdInput').value = data.orderId;
    log('秒杀结果响应', { ms: Math.round(ms), ...json });
    return data.status;
  }

  function startPolling() {
    stopPolling();
    const interval = Math.max(300, Number($('pollIntervalInput').value) || 1000);
    state.pollTimer = setInterval(async () => {
      const status = await queryResult();
      if (status === 'success' || status === 'failed') stopPolling();
    }, interval);
    log('开始轮询', { interval });
  }

  function stopPolling() {
    if (state.pollTimer) clearInterval(state.pollTimer);
    state.pollTimer = null;
  }

  async function loadOrders() {
    const { json } = await api('/order/list', { headers: tokenHeaders() });
    if (json.code !== 0) {
      $('ordersTable').innerHTML = `<div class="bad">${escapeHtml(json.message || '查询失败')}</div>`;
      log('订单列表失败', json);
      return;
    }
    const rows = json.data || [];
    $('ordersTable').innerHTML = rows.length ? `
      <table>
        <thead><tr><th>订单</th><th>商品</th><th>价格</th><th>状态</th><th>时间</th></tr></thead>
        <tbody>${rows.map(o => `
          <tr>
            <td><button type="button" class="small" onclick="selectOrder(${o.orderId})">${o.orderId}</button></td>
            <td>${escapeHtml(o.goodsName)}</td>
            <td>${o.goodsPrice}</td>
            <td>${o.orderStatus}</td>
            <td>${escapeHtml(o.createDate || '')}</td>
          </tr>`).join('')}</tbody>
      </table>` : '<div class="hint">暂无订单</div>';
    log('订单列表已刷新', { count: rows.length });
  }

  window.selectOrder = async (orderId) => {
    $('orderIdInput').value = orderId;
    openTab('tabDetail');
    await loadDetail();
  };

  async function loadDetail() {
    const orderId = $('orderIdInput').value;
    const { json } = await api(`/order/detail/${orderId}`, { headers: tokenHeaders() });
    if (json.code !== 0) {
      $('detailBox').innerHTML = `<div class="bad">${escapeHtml(json.message || '查询失败')}</div>`;
      log('订单详情失败', json);
      return;
    }
    const d = json.data;
    $('detailBox').innerHTML = `
      <table>
        <tbody>
          <tr><th>订单 ID</th><td>${d.orderId}</td></tr>
          <tr><th>商品 ID</th><td>${d.goodsId}</td></tr>
          <tr><th>商品</th><td>${escapeHtml(d.goodsName)}</td></tr>
          <tr><th>数量</th><td>${d.goodsCount}</td></tr>
          <tr><th>成交价</th><td>${d.goodsPrice}</td></tr>
          <tr><th>状态</th><td>${d.orderStatus}</td></tr>
          <tr><th>时间</th><td>${escapeHtml(d.createDate || '')}</td></tr>
          <tr><th>详情</th><td>${escapeHtml(d.goodsDetail || '')}</td></tr>
        </tbody>
      </table>`;
    log('订单详情已刷新', json);
  }

  async function runLoadTest() {
    state.loadAbort = false;
    state.metrics = [];
    updateMetrics();
    const total = Math.max(1, Number($('loadTotalInput').value) || 1);
    const concurrency = Math.max(1, Number($('loadConcurrencyInput').value) || 1);
    const goodsId = $('loadGoodsInput').value;
    const tokens = $('tokenListInput').value.split(/\s+/).map(x => x.trim()).filter(Boolean);
    if (tokens.length < total) {
      log('压测未启动', { message: 'token 数量少于请求数', tokenCount: tokens.length, total });
      return;
    }

    let next = 0;
    const started = performance.now();
    async function worker() {
      while (!state.loadAbort) {
        const index = next++;
        if (index >= total) break;
        const token = tokens[index];
        const oneStart = performance.now();
        try {
          const { json, res } = await api(`/seckill/${goodsId}`, {
            method: 'POST',
            headers: { token, 'X-Forwarded-For': `10.250.${Math.floor(index / 250)}.${(index % 250) + 1}` }
          });
          state.metrics.push({ ms: performance.now() - oneStart, code: json.code, http: res.status });
        } catch (e) {
          state.metrics.push({ ms: performance.now() - oneStart, code: 'ERR', http: 0 });
        }
        if (state.metrics.length % 10 === 0 || state.metrics.length === total) updateMetrics();
      }
    }
    await Promise.all(Array.from({ length: Math.min(concurrency, total) }, worker));
    updateMetrics();
    log('压测完成', { total: state.metrics.length, wallMs: Math.round(performance.now() - started), summary: summarizeMetrics() });
  }

  function summarizeMetrics() {
    const metrics = state.metrics;
    const lat = metrics.map(x => x.ms).sort((a, b) => a - b);
    const pct = (q) => lat.length ? lat[Math.min(lat.length - 1, Math.floor(lat.length * q))] : 0;
    return {
      success: metrics.filter(x => x.code === 0).length,
      soldOutOrFail: metrics.filter(x => x.code !== 0).length,
      avgMs: lat.length ? Math.round(lat.reduce((a, b) => a + b, 0) / lat.length) : 0,
      p95Ms: Math.round(pct(.95))
    };
  }

  function updateMetrics() {
    const s = summarizeMetrics();
    $('mSuccess').textContent = s.success;
    $('mFail').textContent = s.soldOutOrFail;
    $('mAvg').textContent = `${s.avgMs} ms`;
    $('mP95').textContent = `${s.p95Ms} ms`;
  }

  function openTab(id) {
